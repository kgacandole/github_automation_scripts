name: List All Repositories
run-name: List All Repositories
on:
  workflow_dispatch:
    inputs:
      SEARCH_STRINGS:
        description: "Key words to be included in the search (separate by comma if multiple)"
        required: false
        type: string

jobs:
  list-repos:
    name: List Repositories
    runs-on: [ubuntu-latest]
    env:
      OWNER_NAME: kgacandole
    steps:
    - name: Generate GH Token
      uses: kgacandole/github_automation_scripts/.github/actions/generateGithubToken@main

    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        repository: kgacandole/github_automation_scripts
        ref: main
        path: scripts
        token: ${{ env.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ vars.PYTHON_VERSION }}
    
    - name: List Repositories
      shell: bash
      run: |
        pip install requests
        python scripts/python/list_repositories.py "${{ env.GITHUB_TOKEN }}" "${{ env.OWNER_NAME }}" "100" "${{ inputs.SEARCH_STRINGS }}"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: "repository_list"
        path: "repo_list.txt"