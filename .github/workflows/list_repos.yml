name: List All Repositories
run-name: List All Repositories
on:
  workflow_dispatch:
    inputs:
      SEARCH_STRINGS:
        description: "Key words to be included in the search (separate by comma if multiple)"
        required: false
        type: string

jobs:
  list-repos:
    name: List Repositories
    runs-on: [ubuntu-latest]
    env:
      OWNER_NAME: kgacandole
    steps:
    - uses: actions/create-github-app-token@v3
      id: gh-app-token
      with:
        app-id: ${{ secrets.GH_APP_ID }}
        private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
        owner: kgacandole
        skip-token-revoke: true
    
    - name: Set Env Var
      uses: actions/github-script@v7
      with:
        script: core.exportVariable("GH_TOKEN", "${{ steps.gh-app-token.outputs.token }}")

    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        repository: kgacandole/github_automation_scripts
        ref: main
        path: scripts
        token: ${{ env.GH_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ vars.PYTHON_VERSION }}
    
    - name: List Repositories
      shell: bash
      run: |
        pip install requests
        python scripts/python/list_repositories.py "${{ env.GH_TOKEN }}" "${{ env.OWNER_NAME }}" "100" "${{ inputs.SEARCH_STRINGS }}"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: "repository_list"
        path: "repo_list.txt"