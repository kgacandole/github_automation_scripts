name: Generate Changelog
run-name: Generate Changelog
on:
  workflow_dispatch:
    inputs:
      OWNER_NAME:
        description: 'Owner Name'
        type: string
        required: false
      REPOSITORY_NAME:
        description: 'Repository Name'
        type: string
        required: false

jobs:
  generate-changelog:
    name: Generate Changelog
    runs-on: [ubuntu-latest]
    steps:
    - name: Generate GH Token
      uses: kgacandole/github_automation_scripts/.github/actions/generateGithubToken@main

    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        repository: kgacandole/github_automation_scripts
        ref: main
        path: scripts
        token: ${{ env.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ vars.PYTHON_VERSION }}

    - name: Generate Changelog
      shell: bash
      run: |
        python scripts/python/generate_changelog.py ${{ inputs.OWNER_NAME }} ${{ inputs.REPOSITORY_NAME }}
    
    - name: Upload Changelog
      uses: actions/upload-artifact@v4
      with:
        name: "changelog_file"
        path: "CHANGELOG.md"