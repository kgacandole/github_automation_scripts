name: Create Tag
run-name: Create Tag - ${{ inputs.REPOSITORY_NAME }} - ${{ inputs.TAG_NAME }}
on:
  workflow_dispatch:
    inputs:      
      REPOSITORY_NAME:
        description: 'Repository Name'
        type: string
        required: true
      BRANCH_NAME:
        description: 'Branch Name'
        required: true
      TAG_NAME:
        description: 'Tag Name'
        required: true

jobs:
  create-tag:
    name: Create Repository Tag
    runs-on: [ubuntu-latest]
    env:
      OWNER_NAME: kgacandole
      GH_APP_ID: ${{ secrets.GH_APP_ID }}
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
    steps:
    - name: Generate GH Token
      uses: kgacandole/github_automation_scripts/.github/actions/generateGithubToken@main
      
    - name: Get Commit Sha
      id: sha
      uses: kgacandole/github_automation_scripts/.github/actions/invokeGithubApi@main
      with:
        uriPath: "repos/${{ env.OWNER_NAME }}/${{ inputs.REPOSITORY_NAME }}/commits/${{ inputs.BRANCH_NAME }}"
        method: "GET"
    
    - name: Create Tag
      if: steps.sha.outputs.response != ''
      id: create-tag
      uses: kgacandole/github_automation_scripts/.github/actions/invokeGithubApi@main
      with:
        uriPath: "repos/${{ env.OWNER_NAME }}/${{ inputs.REPOSITORY_NAME }}/git/refs"
        method: "POST"
        data: |
          {
            "ref": "refs/tags/${{ inputs.TAG_NAME }}",
            "sha": "${{ fromJson(steps.sha.outputs.response).sha }}"
          }
    
    - name: Print Response
      if: steps.create-tag.outputs.status == '201'
      uses: actions/github-script@v7
      with:
        script: core.notice("Tag '${{ inputs.TAG_NAME }}' successfully created.")