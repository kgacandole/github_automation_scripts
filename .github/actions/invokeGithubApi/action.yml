name: Github HTTP Request
description: Github HTTP Request
inputs:
  uriPath:
    description: 'Uri path for the request'
    type: string
  method:
    description: 'Method to use in the request'
    type: string
  ignoreHttpStatus:
    description: 'List of status codes to ignore'
    type: string
  data:
    description: 'Payload to pass in the request'
    type: string

outputs:
  response:
    description: 'Request response'
    value: ${{ steps.req.outputs.response }}
  status:
    description: 'Status of API call'
    value: ${{ steps.req.outputs.status }}

runs:
  using: "composite"
  steps:
  - name: Call Github API
    id: req
    uses: fjogeleit/http-request-action@v1
    with:
      url: "https://api.github.com/${{ inputs.uriPath }}"
      method: '${{ inputs.method }}'
      customHeaders: '{"Accept": "application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"}'
      bearerToken: ${{ env.GITHUB_TOKEN }}
      ignoreStatusCodes: ${{ inputs.ignoreHttpStatus }}
      data: ${{ inputs.data }}