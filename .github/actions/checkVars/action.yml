name: Check Repository Vars
description: Check Repository Vars
inputs:
  repositoryName:
    description: 'Repository Name where variable needs to be checked'
    type: string
  variableName:
    description: 'Variable name to be checked'
    type: string
  isSecret:
    description: 'Flag if variable is a secret'
    type: string
    default: 'false'

runs:
  using: "composite"
  steps:  
  - name: Identify URL
    id: url
    uses: actions/github-script@v7
    with:
      script: |
        var getVarsUrl = "repos/${{ env.OWNER_NAME }}/${{ inputs.repositoryName }}/actions"
        if("${{ inputs.isSecret }}" == "true"){
          getVarsUrl = getVarsUrl + "/secrets"
        }
        else {
          getVarsUrl = getVarsUrl + "/variables"
        }
        core.setOutput("getVarsUrl", getVarsUrl)

  - name: Get Var
    id: get-var
    uses: kgacandole/github_automation_scripts/.github/actions/invokeGithubApi@main
    with:
      uriPath: "${{ steps.url.outputs.getVarsUrl }}"
      method: "GET"
      maskResponse: "true"
  
  - name: Extract Secret Vars
    id: secret-details
    if: inputs.isSecret == 'true'
    uses: cloudposse/github-action-jq@main
    with:
      compact: true
      input: '${{ steps.get-var.outputs.response }}'
      raw-output: true
      script: |-
        .secrets | .[] | select(.name == "${{ inputs.variableName }}") | .name
  
  - name: Extract Vars
    id: var-details
    if: inputs.isSecret == 'false'
    uses: cloudposse/github-action-jq@main
    with:
      compact: true
      input: '${{ steps.get-var.outputs.response }}'
      raw-output: true
      script: |-
        .variables | .[] | select(.name == "${{ inputs.variableName }}") | .name
  
  - name: Check if Vars Exist
    if: ${{ (inputs.isSecret == 'true' && steps.secret-details.outputs.output != '') || (inputs.isSecret == 'false' && steps.var-details.outputs.output != '') }}
    uses: trstringer/manual-approval@v1
    with:
      secret: ${{ env.GITHUB_TOKEN }}
      approvers: kgacandole
      minimum-approvals: 1
      issue-title: "Updating of Variable '${{ inputs.variableName }}'"
      issue-body: "Please approve or deny this variable change. Triggered from '${{ github.workflow }}' workflow"
      fail-on-denial: true